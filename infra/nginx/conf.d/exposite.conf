server {
    listen 80;
    server_name exposite.com.br www.exposite.com.br 144.91.70.44;

    # Landing page — export estático do Next.js
    root /var/www/landing;
    index index.html;

    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # API Laravel e health check — FastCGI para PHP-FPM
    location ~ ^/(api|up)(/.*)?$ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend backend:9000;
        root /var/www/backend/public;
        fastcgi_pass $backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

